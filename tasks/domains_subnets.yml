---
- name: 'Ensure Foreman Domains'
  theforeman.foreman.domain:
    username: "{{ foreman_admin_user }}"
    password: "{{ foreman_admin_password }}"
    server_url: "{{ foreman_url }}"
    validate_certs: "{{ foreman_validate_certs }}"
    name: "{{ zone['dns_zone'] }}"
    description: "{{ zone['dns_zone'] }} - Managed by Ansible"
    organizations:
      - "{{ foreman_organization }}"
    locations: "{{ zone['locations'] | default(foreman_locations) }}"
    dns_proxy: "{{ zone['smart_proxy'] }}"
    state: 'present'
  loop: "{{ foreman_deploy_networks }}"
  loop_control:
    loop_var: 'zone'
    label: "{{ zone['dns_zone'] }}"

- name: 'Ensure Foreman Subnets'
  theforeman.foreman.subnet:
    username: "{{ foreman_admin_user }}"
    password: "{{ foreman_admin_password }}"
    server_url: "{{ foreman_url }}"
    validate_certs: "{{ foreman_validate_certs }}"
    name: "{{ network['name'] }}"
    description: 'Managed by Ansible, your changes will be lost'
    organizations:
      - "{{ foreman_organization }}"
    locations: "{{ network['locations'] | default(foreman_locations) }}"
    domains:
      - "{{ network['dns_zone'] }}"
    network: "{{ network['address'] | ansible.utils.ipaddr('network') }}"
    gateway: "{{ network['network_gateway'] }}"
    dns_primary: "{{ network['dns_primary'] | default(omit) }}"
    dns_secondary: "{{ network['dns_secondary'] | default(omit) }}"
    cidr: "{{ network['address'] | ansible.utils.ipaddr('prefix') }}"
    ipam: "{{ network['ipam'] | default(omit) }}"
    mtu: "{{ network['mtu'] | default(omit) }}"
    vlanid: "{{ network['vlanid'] | default(omit) }}"
    from_ip: "{{ network['range_start'] | default(omit) }}"
    to_ip: "{{ network['range_end'] | default(omit) }}"
    boot_mode: "{{ network['boot_mode'] | default('DHCP') }}"
    dns_proxy: "{{ network['dns_proxy'] | default(network['smart_proxy']) }}"
    dhcp_proxy: "{{ network['dhcp_proxy'] | default(network['smart_proxy']) }}"
    tftp_proxy: "{{ network['tftp_proxy'] | default(network['smart_proxy']) }}"
    httpboot_proxy: "{{ network['httpboot_proxy'] | default(network['smart_proxy']) }}"
    template_proxy: "{{ network['template_proxy'] | default(network['smart_proxy']) }}"
    discovery_proxy: "{{ network['discovery_proxy'] | default((network['smart_proxy'] == ansible_facts['fqdn']) | ternary(omit, network['smart_proxy'])) }}"
    state: 'present'
  loop: "{{ foreman_deploy_networks }}"
  loop_control:
    loop_var: 'network'
    label: "{{ network['name'] }}"
